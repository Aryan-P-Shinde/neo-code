ai_usage_summary: |
  Used Claude as a coding and architecture assistant. Problem decomposition,
  scoring design decisions, and understanding of the dataset were developed
  collaboratively. All code was reviewed, understood, and tested locally.
  No candidate data was fed to any LLM during ranking.

methodology_summary: |
  Three-layer evidence-based ranker. Scores what a candidate's history proves,
  not what their profile claims.

  Layer 1 — Role Fit (weighted sum): title trajectory and career progression
  toward ML/AI (25%), career description evidence — specific technical terms
  found in job description text, not skills section (35%), experience range fit
  against JD's 5-9yr target (15%), location preference for Pune/Noida/India (10%),
  product vs consulting company background (15%).

  Layer 2 — Evidence Quality multiplier (0.6–1.25x): cross-references skill
  proficiency claims against duration months, platform assessment scores, and
  endorsements. Catches keyword stuffers whose claimed expertise doesn't hold
  up under scrutiny.

  Layer 3 — Availability multiplier (0.45–1.0x): behavioral gate using last
  active date, recruiter response rate, notice period, and open-to-work flag.
  Hard ceiling applied to candidates inactive 6+ months with <15% response rate.

  Honeypot detection runs before scoring — flags profiles with impossible YoE
  vs career span, assessment scores contradicting claimed proficiency, and
  duration-proficiency mismatches. Runtime: ~30 seconds on CPU for 100K candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true